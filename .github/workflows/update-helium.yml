name: Update Helium

# Checks imputnet/helium-linux for a newer release, bumps the vendored package's
# version + per-system hashes, verifies it still builds, and commits to main.

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: # allow manual runs

permissions:
  contents: write

concurrency:
  group: update-helium
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true

      - name: Bump Helium package
        id: update
        run: ./pkgs/helium/update.sh

      - name: Verify it builds
        if: steps.update.outputs.changed == 'true'
        run: nix build --no-link --print-build-logs .#helium

      - name: Commit to main
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(helium): update to ${{ steps.update.outputs.version }}"
          git push
